<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      color: #333;
      padding: 16px;
    }
    h1 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #1a1a1a;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #666;
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
    }
    input:focus { border-color: #f0913a; }
    .actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    button {
      flex: 1;
      padding: 8px 0;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    #save-btn {
      background: #f0913a;
      color: white;
    }
    #save-btn:hover { background: #e07e28; }
    #capture-btn {
      background: #333;
      color: white;
    }
    #capture-btn:hover { background: #555; }
    .status {
      margin-top: 8px;
      font-size: 12px;
      text-align: center;
      min-height: 16px;
    }
    .status.success { color: #2ea043; }
    .status.error { color: #cf222e; }
    .divider {
      border-top: 1px solid #eee;
      margin: 12px 0;
    }
  </style>
</head>
<body>
  <h1>Save to AI Notes</h1>

  <label for="server-url">Server URL</label>
  <input type="text" id="server-url" placeholder="http://localhost:8765">

  <div class="divider"></div>

  <div class="actions">
    <button id="save-btn">Save Settings</button>
    <button id="capture-btn">Capture Page</button>
  </div>
  <div class="status" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
